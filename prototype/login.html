<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - D-Site 云胶片管理系统</title>
    <link rel="stylesheet" href="https://unpkg.com/element-ui@2.15.14/lib/theme-chalk/index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/common.css">
    <style>
        body {
            background: var(--bg-color);
        }

        .login-page {
            min-height: 100vh;
            display: flex;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .login-left {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px;
            color: white;
        }

        .login-left h1 {
            font-size: 48px;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .login-left p {
            font-size: 18px;
            opacity: 0.9;
            text-align: center;
            max-width: 400px;
        }

        .login-right {
            width: 480px;
            background: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 60px;
            box-shadow: -10px 0 30px rgba(0,0,0,0.1);
        }

        .login-form {
            width: 100%;
        }

        .login-form h2 {
            font-size: 28px;
            color: var(--text-primary);
            margin-bottom: 10px;
        }

        .login-form .subtitle {
            color: var(--text-secondary);
            margin-bottom: 40px;
        }

        .login-logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--primary-color), #096dd9);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
            box-shadow: 0 8px 24px rgba(24, 144, 255, 0.3);
        }

        .login-logo i {
            font-size: 40px;
            color: white;
        }

        .demo-accounts {
            margin-top: 30px;
            padding: 15px;
            background: #f0f9eb;
            border-radius: 8px;
            border-left: 4px solid var(--success-color);
        }

        .demo-accounts h4 {
            font-size: 14px;
            color: var(--success-color);
            margin-bottom: 10px;
        }

        .demo-accounts ul {
            list-style: none;
            font-size: 13px;
            color: var(--text-regular);
        }

        .demo-accounts li {
            margin: 5px 0;
        }

        .demo-accounts code {
            background: #e8f5e9;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: Consolas, monospace;
        }
    </style>
</head>
<body>
    <div class="login-page">
        <div class="login-left">
            <h1>D-Site 云胶片</h1>
            <p>医学影像云端管理平台，让诊断更高效，让患者更便捷</p>
        </div>
        <div class="login-right">
            <div class="login-form">
                <div class="login-logo">
                    <i class="fas fa-x-ray"></i>
                </div>
                <h2>欢迎回来</h2>
                <p class="subtitle">请登录您的账号</p>

                <form onsubmit="handleLogin(event)">
                    <div class="form-item">
                        <label class="form-label">用户名</label>
                        <input type="text" class="input" placeholder="请输入用户名" value="admin">
                    </div>
                    <div class="form-item">
                        <label class="form-label">密码</label>
                        <input type="password" class="input" placeholder="请输入密码" value="admin123">
                    </div>
                    <div class="form-item" style="flex-direction: row; align-items: center; justify-content: space-between;">
                        <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                            <input type="checkbox" checked style="width: 16px; height: 16px;">
                            <span style="font-size: 14px; color: var(--text-secondary);">记住密码</span>
                        </label>
                        <a href="#" style="color: var(--primary-color); font-size: 14px; text-decoration: none;">忘记密码？</a>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 16px;">
                        <i class="fas fa-sign-in-alt"></i> 登录
                    </button>
                </form>

                <div class="demo-accounts">
                    <h4><i class="fas fa-info-circle"></i> 演示账号</h4>
                    <ul>
                        <li>管理员: <code>admin</code> / <code>admin123</code></li>
                        <li>放射科医生: <code>radiologist</code> / <code>admin123</code></li>
                        <li>临床医生: <code>clinician</code> / <code>admin123</code></li>
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <script>
        function handleLogin(event) {
            event.preventDefault();
            window.location.href = 'pages/cloudfilm/dashboard.html';
        }
    </script>
</body>
</html>
