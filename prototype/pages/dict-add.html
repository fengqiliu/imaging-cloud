<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新增字典 - D-Site 云胶片</title>
    <link rel="stylesheet" href="https://unpkg.com/element-ui@2.15.14/lib/theme-chalk/index.css">

    <link rel="stylesheet" href="../css/common.css">
    <style>
        /* Page-specific styles for add-dict page */
        .add-dict-container {
            max-width: 720px;
            margin: 0 auto;
        }

        /* Form Section */
        .form-section {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
            padding: 24px;
            margin-bottom: 24px;
        }

        .form-section-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-section-title i {
            color: var(--primary-color);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .form-item.full-width {
            grid-column: 1 / -1;
        }

        .form-item .form-label .required {
            color: var(--danger-color);
            margin-left: 2px;
        }

        .form-hint {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 6px;
        }

        /* Style Preview */
        .style-preview {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .style-preview .preview-tag {
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
        }

        .style-preview .preview-tag.default {
            background: var(--bg-color);
            color: var(--text-secondary);
        }

        .style-preview .preview-tag.primary {
            background: #e6f7ff;
            color: var(--primary-color);
        }

        .style-preview .preview-tag.success {
            background: #f6ffed;
            color: var(--success-color);
        }

        .style-preview .preview-tag.warning {
            background: #fffbe6;
            color: #ad6800;
        }

        .style-preview .preview-tag.danger {
            background: #fff1f0;
            color: var(--danger-color);
        }

        /* Action Bar */
        .action-bar {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
            margin-top: 24px;
        }

        /* Checkbox Group */
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .checkbox-group input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        /* Switch */
        .switch {
            position: relative;
            width: 44px;
            height: 24px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .switch-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #dcdfe6;
            transition: 0.3s;
            border-radius: 24px;
        }

        .switch-slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: 0.3s;
            border-radius: 50%;
        }

        .switch input:checked + .switch-slider {
            background-color: var(--primary-color);
        }

        .switch input:checked + .switch-slider:before {
            transform: translateX(20px);
        }

        /* Validation Message */
        .input.error {
            border-color: var(--danger-color);
        }

        .error-message {
            color: var(--danger-color);
            font-size: 12px;
            margin-top: 4px;
        }

        /* Icon Selector */
        .icon-selector {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 8px;
            max-height: 160px;
            overflow-y: auto;
            padding: 12px;
            background: var(--bg-color);
            border-radius: 8px;
        }

        .icon-selector .icon-item {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-secondary);
        }

        .icon-selector .icon-item:hover {
            background: white;
            color: var(--primary-color);
        }

        .icon-selector .icon-item.selected {
            background: var(--primary-color);
            color: white;
        }

        /* Radio Group */
        .radio-group {
            display: flex;
            gap: 20px;
        }

        .radio-item {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }

        .radio-item input[type="radio"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
        }
    </style>
</head>

                <div class="header-left"><div class="breadcrumb"><span>首页</span><i class="fas fa-chevron-right" style="font-size: 10px;"></i><a href="dict.html">字典管理</a><i class="fas fa-chevron-right" style="font-size: 10px;"></i><span>新增字典</span></div></div>
                <div class="header-right">

                    <div class="user-dropdown">

                            <div class="user-avatar">A</div>

                                <span class="user-name">管理员</span>

                        <h1 class="page-title">新增字典</h1>

                    </div>

                    <form id="dictForm">
                        <!-- Basic Info Section -->
                        <div class="form-section">
                            <div class="form-section-title">
                                <i class="fas fa-info-circle"></i>
                                基本信息
                            </div>
                            <div class="form-grid">
                                <div class="form-item">
                                    <label class="form-label">
                                        字典标签 <span class="required">*</span>
                                    </label>
                                    <input type="text" class="input" id="dictLabel" placeholder="请输入字典标签" maxlength="50">
                                    <div class="form-hint">如：CT、MRI、待检查等</div>
                                </div>
                                <div class="form-item">
                                    <label class="form-label">
                                        字典键值 <span class="required">*</span>
                                    </label>
                                    <input type="text" class="input" id="dictValue" placeholder="请输入字典键值" maxlength="50">
                                    <div class="form-hint">英文或下划线，如：CT、MRI、pending</div>
                                </div>
                                <div class="form-item">
                                    <label class="form-label">
                                        所属类型 <span class="required">*</span>
                                    </label>
                                    <select class="select" id="dictType" style="width: 100%;">
                                        <option value="">请选择字典类型</option>
                                        <option value="1">检查状态</option>
                                        <option value="2">检查类型</option>
                                        <option value="3">影像模态</option>
                                        <option value="4">性别</option>
                                        <option value="5">报告状态</option>
                                    </select>
                                </div>
                                <div class="form-item">
                                    <label class="form-label">排序号</label>
                                    <input type="number" class="input" id="dictSort" placeholder="0" min="0" max="9999" value="0">
                                    <div class="form-hint">数字越小排序越靠前</div>
                                </div>
                            </div>
                        </div>

                        <!-- Appearance Section -->
                        <div class="form-section">
                            <div class="form-section-title">
                                <i class="fas fa-palette"></i>
                                显示样式
                            </div>
                            <div class="form-grid">
                                <div class="form-item">
                                    <label class="form-label">样式类型</label>
                                    <div class="radio-group">
                                        <label class="radio-item">
                                            <input type="radio" name="styleType" value="default" checked>
                                            <span>默认</span>
                                        </label>
                                        <label class="radio-item">
                                            <input type="radio" name="styleType" value="primary">
                                            <span>主要</span>
                                        </label>
                                        <label class="radio-item">
                                            <input type="radio" name="styleType" value="success">
                                            <span>成功</span>
                                        </label>
                                        <label class="radio-item">
                                            <input type="radio" name="styleType" value="warning">
                                            <span>警告</span>
                                        </label>
                                        <label class="radio-item">
                                            <input type="radio" name="styleType" value="danger">
                                            <span>危险</span>
                                        </label>
                                    </div>
                                </div>

                                    <label class="form-label">样式预览</label>
                                    <div class="style-preview" id="stylePreview">
                                        <span class="preview-tag default">default</span>
                                        <span class="preview-tag primary">primary</span>
                                        <span class="preview-tag success">success</span>
                                        <span class="preview-tag warning">warning</span>
                                        <span class="preview-tag danger">danger</span>
                                    </div>
                                </div>

    <style>
        .toast { position: fixed; top: 20px; right: 20px; padding: 12px 24px; border-radius: 8px; font-size: 14px; z-index: 2000; display: flex; align-items: center; gap: 8px; animation: slideIn 0.3s ease; }
        .toast.success { background: #f6ffed; border: 1px solid #b7eb8f; color: #52c41a; }
        .toast.info { background: #e6f7ff; border: 1px solid #91d5ff; color: #1890ff; }
        .toast.warning { background: #fffbe6; border: 1px solid #ffe58f; color: #faad14; }
        .toast.error { background: #fff1f0; border: 1px solid #ffccc7; color: #ff4d4f; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>

    <script>
        // 表单数据
        let formData = {
            label: '',
            value: '',
            type: '',
            sort: 0,
            styleType: 'default',
            status: true,
            isDefault: false,
            remark: ''
        };

        // 验证规则
        const validationRules = {
            label: { required: true, message: '请输入字典标签', pattern: /^\S+$/, patternMessage: '标签不能包含空白字符' },
            value: { required: true, message: '请输入字典键值', pattern: /^[a-zA-Z_][a-zA-Z0-9_]*$/, patternMessage: '键值只能包含字母、数字和下划线' },
            type: { required: true, message: '请选择字典类型' }
        };

        // 状态切换
        document.getElementById('dictStatus').addEventListener('change', function() {
            document.getElementById('statusText').textContent = this.checked ? '正常' : '停用';
            formData.status = this.checked;
        });

        // 默认值切换
        document.getElementById('dictDefault').addEventListener('change', function() {
            document.getElementById('defaultText').textContent = this.checked ? '是' : '否';
            formData.isDefault = this.checked;
        });

        // 样式选择
        document.querySelectorAll('input[name="styleType"]').forEach(radio => {
            radio.addEventListener('change', function() {
                updateStylePreview(this.value);
                formData.styleType = this.value;
            });
        });

        // 更新样式预览
        function updateStylePreview(selected) {
            const preview = document.getElementById('stylePreview');
            preview.innerHTML = `
                <span class="preview-tag ${selected === 'default' ? 'default' : ''}" style="${selected === 'default' ? '' : 'background: ' + getStyleBg(selected) + '; color: ' + getStyleColor(selected)}">${selected}</span>
            `;
        }

        function getStyleBg(type) {
            const map = {
                primary: '#e6f7ff',
                success: '#f6ffed',
                warning: '#fffbe6',
                danger: '#fff1f0'
            };
            return map[type] || '#f5f7fa';
        }

        function getStyleColor(type) {
            const map = {
                primary: '#1890ff',
                success: '#52c41a',
                warning: '#ad6800',
                danger: '#ff4d4f'
            };
            return map[type] || '#909399';
        }

        // 自动转换标签为键值
        document.getElementById('dictLabel').addEventListener('input', function() {
            if (!document.getElementById('dictValue').dataset.manual) {
                document.getElementById('dictValue').value = this.value.toUpperCase()
                    .replace(/\s+/g, '_')
                    .replace(/[^A-Z0-9_]/g, '');
            }
        });

        document.getElementById('dictValue').addEventListener('input', function() {
            this.dataset.manual = 'true';
        });

        // 表单验证
        function validateForm() {
            let isValid = true;
            const errors = [];

            const label = document.getElementById('dictLabel');
            const value = document.getElementById('dictValue');
            const type = document.getElementById('dictType');

            // 清除之前的错误状态
            document.querySelectorAll('.input.error').forEach(el => el.classList.remove('error'));
            document.querySelectorAll('.error-message').forEach(el => el.remove());

            if (!label.value.trim()) {
                showFieldError(label, validationRules.label.message);
                errors.push(validationRules.label.message);
                isValid = false;
            }

            if (!value.value.trim()) {
                showFieldError(value, validationRules.value.message);
                errors.push(validationRules.value.message);
                isValid = false;
            } else if (!validationRules.value.pattern.test(value.value)) {
                showFieldError(value, validationRules.value.patternMessage);
                errors.push(validationRules.value.patternMessage);
                isValid = false;
            }

            if (!type.value) {
                showFieldError(type, validationRules.type.message);
                errors.push(validationRules.type.message);
                isValid = false;
            }

            return isValid;
        }

        function showFieldError(element, message) {
            element.classList.add('error');
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error-message';
            errorDiv.textContent = message;
            element.parentElement.appendChild(errorDiv);
        }

        // 表单提交
        document.getElementById('dictForm').addEventListener('submit', function(e) {
            e.preventDefault();

            if (!validateForm()) {
                showToast('请检查表单输入', 'error');
                return;
            }

            // 收集表单数据
            formData = {
                label: document.getElementById('dictLabel').value.trim(),
                value: document.getElementById('dictValue').value.trim(),
                type: document.getElementById('dictType').value,
                sort: parseInt(document.getElementById('dictSort').value) || 0,
                styleType: document.querySelector('input[name="styleType"]:checked').value,
                status: document.getElementById('dictStatus').checked,
                isDefault: document.getElementById('dictDefault').checked,
                remark: document.getElementById('dictRemark').value.trim()
            };

            console.log('提交数据:', formData);
            showToast('字典保存成功', 'success');

            // 模拟保存后跳转
            setTimeout(() => {
                window.location.href = 'dict.html';
            }, 1000);
        });

        // 重置表单
        function resetForm() {
            document.getElementById('dictForm').reset();
            document.getElementById('dictStatus').checked = true;
            document.getElementById('dictDefault').checked = false;
            document.getElementById('dictSort').value = '0';
            document.getElementById('statusText').textContent = '正常';
            document.getElementById('defaultText').textContent = '否';
            document.getElementById('dictValue').dataset.manual = '';

            // 重置样式预览
            document.querySelector('input[name="styleType"][value="default"]').checked = true;
            updateStylePreview('default');

            // 清除错误状态
            document.querySelectorAll('.input.error').forEach(el => el.classList.remove('error'));
            document.querySelectorAll('.error-message').forEach(el => el.remove());

            showToast('表单已重置', 'info');
        }

        // Toast 提示
        function showToast(message, type) {
            const toast = document.getElementById('toast');
            toast.className = `toast ${type}`;
            const icons = {
                success: 'check-circle',
                info: 'info-circle',
                warning: 'exclamation-circle',
                error: 'times-circle'
            };
            toast.innerHTML = `<i class="fas fa-${icons[type] || 'info-circle'}"></i> ${message}`;
            toast.style.display = 'flex';
            setTimeout(() => { toast.style.display = 'none'; }, 3000);
        }

        // 初始化
        document.getElementById('dictSort').value = '0';

        // 用户下拉菜单
        const userDropdown = document.getElementById('userDropdown');
        const userDropdownMenu = document.getElementById('userDropdownMenu');
        userDropdown?.addEventListener('click', function(e) {
            e.stopPropagation();
            userDropdownMenu.classList.toggle('show');
        });
        document.addEventListener('click', function() {
            userDropdownMenu?.classList.remove('show');
        });

        // 退出登录
        function openLogoutModal() {
            userDropdownMenu?.classList.remove('show');
            document.getElementById('logoutModal').style.display = 'flex';
        }
        function closeLogoutModal() {
            document.getElementById('logoutModal').style.display = 'none';
        }
        function confirmLogout() {
            closeLogoutModal();
            showToast('正在退出...', 'info');
            setTimeout(() => {
                window.location.href = 'login.html';
            }, 800);
        }
