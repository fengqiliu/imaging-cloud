<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - D-Site 云胶片</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary-color: #1890ff;
            --primary-light: #40a9ff;
            --primary-dark: #096dd9;
            --success-color: #52c41a;
            --text-primary: #303133;
            --text-secondary: #909399;
            --text-regular: #606266;
            --border-color: #dcdfe6;
            --bg-color: #f5f7fa;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
        }
        .login-page {
            min-height: 100vh;
            display: flex;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .login-left {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px;
            color: white;
        }
        .login-left h1 {
            font-size: 48px;
            margin-bottom: 20px;
            font-weight: 600;
        }
        .login-left p {
            font-size: 18px;
            opacity: 0.9;
            text-align: center;
            max-width: 400px;
        }
        .login-right {
            width: 480px;
            background: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 60px;
            box-shadow: -10px 0 30px rgba(0,0,0,0.1);
        }
        .login-form { width: 100%; }
        .login-form h2 {
            font-size: 28px;
            color: var(--text-primary);
            margin-bottom: 10px;
        }
        .login-form .subtitle {
            color: var(--text-secondary);
            margin-bottom: 40px;
        }
        .login-logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--primary-color), #096dd9);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
            box-shadow: 0 8px 24px rgba(24, 144, 255, 0.3);
        }
        .login-logo i { font-size: 40px; color: white; }
        .demo-accounts {
            margin-top: 30px;
            padding: 15px;
            background: #f0f9eb;
            border-radius: 8px;
            border-left: 4px solid var(--success-color);
        }
        .demo-accounts h4 {
            font-size: 14px;
            color: var(--success-color);
            margin-bottom: 10px;
        }
        .demo-accounts ul {
            list-style: none;
            font-size: 13px;
            color: var(--text-regular);
        }
        .demo-accounts li { margin: 5px 0; }
        .demo-accounts code {
            background: #e8f5e9;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: Consolas, monospace;
        }
        .form-label {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }
        .input {
            padding: 9px 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: all 0.3s;
            width: 100%;
        }
        .input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(24, 144, 255, 0.1);
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 9px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
            gap: 6px;
        }
        .btn-primary {
            background: var(--primary-color);
            color: white;
        }
        .btn-primary:hover { background: var(--primary-light); }
        .btn-default {
            background: white;
            color: var(--text-regular);
            border: 1px solid var(--border-color);
        }
    </style>
</head>
<body>
    <div id="loginPage" class="login-page">
        <div class="login-left">
            <div class="login-logo" style="width:100px;height:100px;border-radius:24px;">
                <i class="fas fa-x-ray" style="font-size:48px;"></i>
            </div>
            <h1>D-Site 云胶片</h1>
            <p>医学影像云管理平台 - 让诊断更高效，让影像更有价值</p>
        </div>
        <div class="login-right">
            <div class="login-form">
                <div class="login-logo">
                    <i class="fas fa-user"></i>
                </div>
                <h2>欢迎回来</h2>
                <p class="subtitle">请登录您的账号</p>
                <form>
                    <div style="margin-bottom: 20px;">
                        <div class="form-label">用户名</div>
                        <input type="text" class="input" placeholder="请输入用户名" value="admin">
                    </div>
                    <div style="margin-bottom: 20px;">
                        <div class="form-label">密码</div>
                        <input type="password" class="input" placeholder="请输入密码" value="admin123">
                    </div>
                    <div style="margin-bottom: 20px; display: flex; align-items: center;">
                        <input type="checkbox" id="remember" checked style="margin-right: 8px;">
                        <label for="remember" style="font-size: 14px; color: var(--text-secondary);">记住密码</label>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">
                        <i class="fas fa-sign-in-alt"></i>
                        登 录
                    </button>
                </form>
                <div class="demo-accounts">
                    <h4><i class="fas fa-info-circle"></i> 测试账号</h4>
                    <ul>
                        <li>管理员: <code>admin</code> / <code>admin123</code></li>
                        <li>放射科医生: <code>radiologist</code> / <code>admin123</code></li>
                        <li>临床医生: <code>clinician</code> / <code>admin123</code></li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
