<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - D-Site 云胶片</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/common.css">
    <style>
        body {
            background:
                radial-gradient(circle at top left, rgba(255, 255, 255, 0.18), transparent 28%),
                radial-gradient(circle at bottom right, rgba(24, 144, 255, 0.16), transparent 26%),
                linear-gradient(135deg, #0a3d91 0%, #1890ff 42%, #6f42c1 100%);
        }
        .login-page {
            min-height: 100vh;
            display: flex;
            position: relative;
            overflow: hidden;
        }
        .login-page::before,
        .login-page::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            filter: blur(10px);
            opacity: 0.45;
            animation: floatOrb 10s ease-in-out infinite;
        }
        .login-page::before {
            width: 320px;
            height: 320px;
            background: rgba(255, 255, 255, 0.12);
            top: -100px;
            left: -80px;
        }
        .login-page::after {
            width: 240px;
            height: 240px;
            background: rgba(255, 255, 255, 0.14);
            right: 120px;
            bottom: -80px;
            animation-delay: -3s;
        }
        @keyframes floatOrb {
            0%, 100% { transform: translate3d(0, 0, 0); }
            50% { transform: translate3d(0, -18px, 0); }
        }
        .login-left {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px 72px;
            color: white;
            position: relative;
            z-index: 1;
            animation: fadeInUp 0.7s ease both;
        }
        .login-left h1 {
            font-size: 52px;
            margin-bottom: 18px;
            font-weight: 700;
            letter-spacing: -1px;
        }
        .login-left p {
            font-size: 18px;
            opacity: 0.92;
            text-align: center;
            max-width: 460px;
            line-height: 1.8;
        }
        .feature-list {
            margin-top: 32px;
            display: grid;
            grid-template-columns: repeat(2, minmax(180px, 1fr));
            gap: 16px;
            max-width: 520px;
        }
        .feature-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 18px;
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.16);
            border-radius: 16px;
            backdrop-filter: blur(12px);
            transition: all var(--transition-base);
        }
        .feature-item:hover {
            transform: translateY(-4px);
            background: rgba(255, 255, 255, 0.16);
        }
        .feature-item i {
            width: 36px;
            height: 36px;
            border-radius: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.16);
        }
        .feature-item span {
            font-size: 14px;
            font-weight: 500;
        }
        .login-right {
            width: 500px;
            background: rgba(255, 255, 255, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 56px;
            box-shadow: -20px 0 50px rgba(0,0,0,0.12);
            backdrop-filter: blur(20px);
            position: relative;
            z-index: 1;
            animation: fadeInScale 0.65s ease both 0.08s;
        }
        .login-form { width: 100%; }
        .login-form h2 {
            font-size: 28px;
            color: var(--text-primary);
            margin-bottom: 10px;
        }
        .login-form .subtitle {
            color: var(--text-secondary);
            margin-bottom: 40px;
        }
        .login-logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
            box-shadow: 0 12px 30px rgba(24, 144, 255, 0.24);
            animation: pulseGlow 3s infinite;
        }
        .login-logo i { font-size: 40px; color: white; }
        .demo-accounts {
            margin-top: 30px;
            padding: 18px;
            background: linear-gradient(180deg, rgba(82, 196, 26, 0.08), rgba(82, 196, 26, 0.03));
            border-radius: 12px;
            border-left: 4px solid var(--success-color);
            animation: fadeInUp 0.6s ease both 0.18s;
        }
        .demo-accounts h4 {
            font-size: 14px;
            color: var(--success-color);
            margin-bottom: 10px;
        }
        .demo-accounts ul {
            list-style: none;
            font-size: 13px;
            color: var(--text-regular);
        }
        .demo-accounts li { margin: 5px 0; }
        .demo-accounts code {
            background: rgba(82, 196, 26, 0.12);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: Consolas, monospace;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-label {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }
        .remember-row {
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .remember-box {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            font-size: 14px;
        }
        .remember-row a {
            font-size: 14px;
            color: var(--primary-color);
        }
        .login-submit {
            width: 100%;
            min-height: 44px;
            font-size: 15px;
        }
        .login-submit.loading {
            pointer-events: none;
            opacity: 0.85;
        }
        .login-footnote {
            margin-top: 18px;
            text-align: center;
            font-size: 13px;
            color: var(--text-secondary);
        }
        @media (max-width: 1100px) {
            .login-left {
                display: none;
            }
            .login-right {
                width: min(100%, 520px);
                margin: 24px;
                border-radius: 24px;
            }
            .login-page {
                justify-content: center;
                align-items: center;
            }
        }
        @media (max-width: 640px) {
            .login-right {
                padding: 32px 24px;
            }
        }
    </style>
</head>
<body>
    <div id="loginPage" class="login-page">
        <div class="login-left">
            <div class="login-logo" style="width:100px;height:100px;border-radius:24px;">
                <i class="fas fa-x-ray" style="font-size:48px;"></i>
            </div>
            <h1>D-Site 云胶片</h1>
            <p>医学影像云管理平台 - 让诊断更高效，让影像更有价值</p>
            <div class="feature-list">
                <div class="feature-item"><i class="fas fa-cloud-upload-alt"></i><span>云端影像安全存储</span></div>
                <div class="feature-item"><i class="fas fa-eye"></i><span>多终端在线阅片</span></div>
                <div class="feature-item"><i class="fas fa-file-signature"></i><span>诊断报告高效流转</span></div>
                <div class="feature-item"><i class="fas fa-robot"></i><span>AI 辅助通俗解读</span></div>
            </div>
        </div>
        <div class="login-right">
            <div class="login-form">
                <div class="login-logo">
                    <i class="fas fa-user"></i>
                </div>
                <h2>欢迎回来</h2>
                <p class="subtitle">请登录您的账号</p>
                <form id="loginForm">
                    <div class="form-group">
                        <div class="form-label">用户名</div>
                        <input type="text" class="input" placeholder="请输入用户名" value="admin">
                    </div>
                    <div class="form-group">
                        <div class="form-label">密码</div>
                        <input type="password" class="input" placeholder="请输入密码" value="admin123">
                    </div>
                    <div class="remember-row">
                        <label for="remember" class="remember-box">
                            <input type="checkbox" id="remember" checked>
                            <span>记住密码</span>
                        </label>
                        <a href="javascript:void(0)">忘记密码？</a>
                    </div>
                    <button type="submit" class="btn btn-primary login-submit" id="loginSubmit">
                        <i class="fas fa-sign-in-alt"></i>
                        登 录
                    </button>
                </form>
                <div class="demo-accounts">
                    <h4><i class="fas fa-info-circle"></i> 测试账号</h4>
                    <ul>
                        <li>管理员: <code>admin</code> / <code>admin123</code></li>
                        <li>放射科医生: <code>radiologist</code> / <code>admin123</code></li>
                        <li>临床医生: <code>clinician</code> / <code>admin123</code></li>
                    </ul>
                </div>
                <div class="login-footnote">建议使用 Chrome / Edge 获得更佳阅片体验</div>
            </div>
        </div>
    </div>
    <div id="toast" class="toast info" style="display: none;"></div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const loginSubmit = document.getElementById('loginSubmit');
        const toast = document.getElementById('toast');

        function showToast(message, type = 'info') {
            toast.className = `toast ${type}`;
            toast.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'info-circle'}"></i><span>${message}</span>`;
            toast.style.display = 'flex';
            clearTimeout(showToast.timer);
            showToast.timer = setTimeout(() => {
                toast.style.display = 'none';
            }, 2200);
        }

        loginForm.addEventListener('submit', (event) => {
            event.preventDefault();
            loginSubmit.classList.add('loading');
            loginSubmit.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> 登录中...';

            setTimeout(() => {
                loginSubmit.classList.remove('loading');
                loginSubmit.innerHTML = '<i class="fas fa-sign-in-alt"></i> 登 录';
                showToast('登录成功，正在进入系统...', 'success');
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 500);
            }, 900);
        });
    </script>
</body>
</html>
