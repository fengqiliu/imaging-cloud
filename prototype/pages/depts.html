<!DOCTYPE html>

<head>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/common.css">
    <style>
    </style>
</head>
<body>
    <div class="main-layout">
        <div class="sidebar">
            <div class="sidebar-header"><div class="sidebar-logo"><i class="fas fa-x-ray"></i></div><span class="sidebar-title">D-Site</span></div>
            <div class="sidebar-menu">
                <a class="menu-item" href="dashboard.html"><i class="fas fa-th-large"></i><span>仪表盘</span></a>
                <div class="menu-section">云胶片业务</div>
                <a class="menu-item" href="patients.html"><i class="fas fa-users"></i><span>患者管理</span></a>
                <a class="menu-item" href="examinations.html"><i class="fas fa-clipboard-list"></i><span>检查管理</span><span class="badge">5</span></a>
                <a class="menu-item" href="images.html"><i class="fas fa-images"></i><span>影像管理</span></a>
                <a class="menu-item" href="image-viewer.html"><i class="fas fa-eye"></i><span>DICOM阅片</span></a>
                <a class="menu-item" href="reports.html"><i class="fas fa-file-medical"></i><span>诊断报告</span></a>
                <a class="menu-item" href="ai.html"><i class="fas fa-robot"></i><span>AI解读</span><span class="badge" style="background: #722ed1;">NEW</span></a>
                <a class="menu-item" href="share.html"><i class="fas fa-share-alt"></i><span>分享管理</span></a>
                <a class="menu-item" href="statistics.html"><i class="fas fa-chart-bar"></i><span>运营统计</span></a>
                <div class="menu-section">系统管理</div>
                <a class="menu-item" href="users.html"><i class="fas fa-user-cog"></i><span>用户管理</span></a>
                <a class="menu-item" href="roles.html"><i class="fas fa-theater-masks"></i><span>角色管理</span></a>
                <a class="menu-item active" href="depts.html"><i class="fas fa-hospital"></i><span>院区管理</span></a>
                <a class="menu-item" href="dict.html"><i class="fas fa-book"></i><span>字典管理</span></a>
                <a class="menu-item" href="logs.html"><i class="fas fa-history"></i><span>日志管理</span></a>
                <a class="menu-item" href="settings.html"><i class="fas fa-cog"></i><span>系统设置</span></a>
            </div>
        </div>
        <div class="main-content">
            <div class="header">
                <div class="header-left"><div class="breadcrumb"><span>首页</span><i class="fas fa-chevron-right" style="font-size: 10px;"></i><span>院区管理</span></div></div>
                <div class="header-right">
                    <div class="header-icon"><i class="fas fa-bell"></i><span class="count"></span></div>
                    <div class="header-icon"><i class="fas fa-question-circle"></i></div>
                    <div class="user-dropdown">
                        <div class="user-info" id="userDropdown">
                            <div class="user-avatar">A</div>
                            <div class="user-detail">
                                <span class="user-name">管理员</span>
                                <span class="user-role">超级管理员</span>
                            </div>
                            <i class="fas fa-chevron-down" style="font-size: 12px; color: var(--text-secondary);"></i>
                        </div>
                        <div class="user-dropdown-menu" id="userDropdownMenu">
                            <div class="user-dropdown-item" onclick="window.location.href='profile.html'"><i class="fas fa-user"></i><span>个人中心</span></div>
                            <div class="user-dropdown-item" onclick="showToast('修改密码开发中...', 'info')"><i class="fas fa-key"></i><span>修改密码</span></div>
                            <div class="user-dropdown-divider"></div>
                            <div class="user-dropdown-item danger" onclick="openLogoutModal()"><i class="fas fa-sign-out-alt"></i><span>退出登录</span></div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="content">
                <div class="page-header"><h1 class="page-title">院区管理</h1><p class="page-desc">管理医疗机构院区信息</p></div>
                <div style="display: grid; grid-template-columns: 400px 1fr; gap: 24px;">
                    <div class="card">
                        <div class="card-header"><div class="card-title"><i class="fas fa-sitemap"></i> 院区树形结构</div><button class="btn btn-primary btn-sm"><i class="fas fa-plus"></i> 新增</button></div>
                        <div class="dept-tree">
                            <div class="dept-item active"><i class="fas fa-hospital" style="color: var(--primary-color);"></i><span>总院</span><span class="dept-count">3个科室</span></div>
                            <div class="dept-item"><i class="fas fa-building" style="color: var(--success-color);"></i><span>分院</span><span class="dept-count">2个科室</span></div>
                            <div class="dept-children">
                                <div class="dept-item"><i class="fas fa-stethoscope" style="color: var(--warning-color);"></i><span>放射科</span></div>
                                <div class="dept-item"><i class="fas fa-heartbeat" style="color: var(--danger-color);"></i><span>内科</span></div>
                                <div class="dept-item"><i class="fas fa-procedures" style="color: #722ed1;"></i><span>外科</span></div>
                            </div>
                        </div>
                    </div>
                    <div class="card">
                        <div class="card-header"><div class="card-title"><i class="fas fa-info-circle"></i> 院区详情 - 总院</div></div>
                        <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; padding: 20px;">
                            <div class="form-item"><label class="form-label">院区名称</label><input type="text" class="input" value="总院"></div>
                            <div class="form-item"><label class="form-label">负责人</label><input type="text" class="input" value="张院长"></div>
                            <div class="form-item"><label class="form-label">联系电话</label><input type="text" class="input" value="021-88888888"></div>
                            <div class="form-item"><label class="form-label">邮箱</label><input type="text" class="input" value="zongyuan@hospital.com"></div>
                            <div class="form-item" style="grid-column: span 2;"><label class="form-label">院区地址</label><input type="text" class="input" value="上海市浦东新区医学园区"></div>
                            <div class="form-item" style="grid-column: span 2;"><label class="form-label">备注</label><textarea class="input" style="min-height: 80px;">总部院区，设放射科、内科、外科等临床科室</textarea></div>
                        </div>
                        <div style="padding: 0 20px 20px; display: flex; gap: 12px;">
                            <button class="btn btn-primary"><i class="fas fa-save"></i> 保存</button>
                            <button class="btn btn-default"><i class="fas fa-plus"></i> 新增下级</button>
                            <button class="btn btn-danger"><i class="fas fa-trash"></i> 删除</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast" style="display: none;"></div>

    <!-- 退出确认弹窗 -->
    <div id="logoutModal" class="modal-overlay" style="display: none;">
        <div class="modal" style="max-width: 400px;">
            <div class="modal-header">
                <h3 class="modal-title" style="color: var(--danger-color);"><i class="fas fa-sign-out-alt"></i> 确认退出</h3>
                <button class="icon-btn" onclick="closeLogoutModal()"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body" style="text-align: center;">
                <p style="color: var(--text-secondary); margin-bottom: 8px;">确定要退出当前账号吗？</p>
            </div>
            <div class="modal-footer" style="justify-content: center;">
                <button class="btn btn-default" onclick="closeLogoutModal()">取消</button>
                <button class="btn btn-danger" onclick="confirmLogout()"><i class="fas fa-sign-out-alt"></i> 确认退出</button>
            </div>
        </div>
    </div>

    <!-- 删除院区确认弹窗 -->
    <div id="deleteDeptModal" class="modal-overlay" style="display: none;">
        <div class="modal" style="max-width: 420px;">
            <div class="modal-header">
                <h3 class="modal-title"><i class="fas fa-exclamation-triangle" style="color: #ff4d4f; margin-right: 8px;"></i>确认删除</h3>
                <button class="icon-btn" onclick="closeDeleteDeptModal()"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body" style="text-align: center;">
                <div style="width: 64px; height: 64px; border-radius: 50%; background: #fff1f0; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px;">
                    <i class="fas fa-trash" style="font-size: 28px; color: #ff4d4f;"></i>
                </div>
                <p style="color: var(--text-secondary); font-size: 14px; margin-bottom: 8px;">确定要删除以下院区吗？此操作不可恢复。</p>
                <p id="deleteDeptName" style="font-size: 16px; font-weight: 600; color: var(--text-primary); margin-bottom: 20px;">-</p>
                <input type="hidden" id="deleteDeptId">
            </div>
            <div class="modal-footer" style="justify-content: center;">
                <button class="btn btn-default" onclick="closeDeleteDeptModal()">取消</button>
                <button class="btn btn-danger" onclick="handleDeleteDept()"><i class="fas fa-trash"></i> 确认删除</button>
            </div>
        </div>
    </div>

    <style>
        .toast { position: fixed; top: 20px; right: 20px; padding: 12px 24px; border-radius: 8px; font-size: 14px; z-index: 2000; display: flex; align-items: center; gap: 8px; animation: slideIn 0.3s ease; }
        .toast.success { background: #f6ffed; border: 1px solid #b7eb8f; color: #52c41a; }
        .toast.info { background: #e6f7ff; border: 1px solid #91d5ff; color: #1890ff; }
        .toast.warning { background: #fffbe6; border: 1px solid #ffe58f; color: #faad14; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>

    <script>
        // 院区数据
        let depts = [
            { id: 1, name: '总院', leader: '张院长', phone: '021-88888888', email: 'zongyuan@hospital.com', address: '上海市浦东新区医学园区', remark: '总部院区，设放射科、内科、外科等临床科室', hasChildren: true },
            { id: 2, name: '分院', leader: '李副院长', phone: '021-77777777', email: 'fenyuan@hospital.com', address: '上海市静安区医疗中心', remark: '分院区', hasChildren: true },
        ];

        let currentDept = depts[0];

        function renderDeptTree() {
            const container = document.querySelector('.dept-tree');
            let html = `
                <div class="dept-item ${currentDept.id === 1 ? 'active' : ''}" onclick="selectDept(1)">
                    <i class="fas fa-hospital" style="color: var(--primary-color);"></i>
                    <span>总院</span>
                    <span class="dept-count">3个科室</span>
                </div>
                <div class="dept-item ${currentDept.id === 2 ? 'active' : ''}" onclick="selectDept(2)">
                    <i class="fas fa-building" style="color: var(--success-color);"></i>
                    <span>分院</span>
                    <span class="dept-count">2个科室</span>
                </div>
                <div class="dept-children">
                    <div class="dept-item ${currentDept.id === 3 ? 'active' : ''}" onclick="selectDept(3)">
                        <i class="fas fa-stethoscope" style="color: var(--warning-color);"></i>
                        <span>放射科</span>
                    </div>
                    <div class="dept-item ${currentDept.id === 4 ? 'active' : ''}" onclick="selectDept(4)">
                        <i class="fas fa-heartbeat" style="color: var(--danger-color);"></i>
                        <span>内科</span>
                    </div>
                    <div class="dept-item ${currentDept.id === 5 ? 'active' : ''}" onclick="selectDept(5)">
                        <i class="fas fa-procedures" style="color: #722ed1;"></i>
                        <span>外科</span>
                    </div>
                </div>
            `;
            container.innerHTML = html;
        }

        function selectDept(id) {
            const deptNames = { 1: '总院', 2: '分院', 3: '放射科', 4: '内科', 5: '外科' };
            const deptData = {
                1: { name: '总院', leader: '张院长', phone: '021-88888888', email: 'zongyuan@hospital.com', address: '上海市浦东新区医学园区', remark: '总部院区，设放射科、内科、外科等临床科室' },
                2: { name: '分院', leader: '李副院长', phone: '021-77777777', email: 'fenyuan@hospital.com', address: '上海市静安区医疗中心', remark: '分院区' },
                3: { name: '放射科', leader: '王主任', phone: '021-88888801', email: 'fangshe@hospital.com', address: '总院医技楼3楼', remark: '负责CT、MRI、DR等影像检查' },
                4: { name: '内科', leader: '刘主任', phone: '021-88888802', email: 'neike@hospital.com', address: '总院门诊楼2楼', remark: '内科门诊和住院' },
                5: { name: '外科', leader: '陈主任', phone: '021-88888803', email: 'waike@hospital.com', address: '总院外科楼5楼', remark: '外科门诊和手术' },
            };

            currentDept = { id, ...deptData[id] };
            document.querySelector('.card-header .card-title').innerHTML = `<i class="fas fa-info-circle"></i> 院区详情 - ${deptNames[id]}`;

            // 更新表单
            const inputs = document.querySelectorAll('.card input, .card textarea');
            inputs.forEach(input => {
                const label = input.previousElementSibling?.textContent;
                if (label === '院区名称') input.value = deptData[id].name;
                else if (label === '负责人') input.value = deptData[id].leader;
                else if (label === '联系电话') input.value = deptData[id].phone;
                else if (label === '邮箱') input.value = deptData[id].email;
                else if (label === '院区地址') input.value = deptData[id].address;
                else if (label === '备注') input.value = deptData[id].remark;
            });

            renderDeptTree();
        }

        function saveDept() {
            showToast(`院区 "${currentDept.name}" 信息保存成功`, 'success');
        }

        function addChildDept() {
            showToast('新增下级院区功能开发中...', 'info');
        }

        function openDeleteDeptModal() {
            document.getElementById('deleteDeptId').value = currentDept.id;
            document.getElementById('deleteDeptName').textContent = currentDept.name;
            document.getElementById('deleteDeptModal').style.display = 'flex';
        }

        function closeDeleteDeptModal() {
            document.getElementById('deleteDeptModal').style.display = 'none';
        }

        function handleDeleteDept() {
            const id = parseInt(document.getElementById('deleteDeptId').value);
            depts = depts.filter(d => d.id !== id);
            closeDeleteDeptModal();
            showToast(`院区 "${currentDept.name}" 已删除`, 'warning');
            // Select first dept after deletion
            if (depts.length > 0) {
                selectDept(depts[0].id);
            }
        }

        function showToast(message, type) {
            const toast = document.getElementById('toast');
            toast.className = `toast ${type}`;
            toast.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : type === 'warning' ? 'exclamation-circle' : 'info-circle'}"></i> ${message}`;
            toast.style.display = 'flex';
            setTimeout(() => { toast.style.display = 'none'; }, 3000);
        }

        // 新增按钮
        document.querySelector('.card-header .btn')?.addEventListener('click', function() {
            showToast('新增院区功能开发中...', 'info');
        });

        // 保存按钮
        document.querySelectorAll('.btn-primary').forEach(btn => {
            if (btn.textContent.includes('保存')) {
                btn.addEventListener('click', saveDept);
            }
        });

        // 新增下级按钮
        document.querySelectorAll('.btn-default').forEach(btn => {
            if (btn.textContent.includes('新增下级')) {
                btn.addEventListener('click', addChildDept);
            }
        });

        // 删除按钮
        document.querySelectorAll('.btn-danger').forEach(btn => {
            if (btn.textContent.includes('删除')) {
                btn.addEventListener('click', openDeleteDeptModal);
            }
        });

        // 点击背景关闭删除弹窗
        document.getElementById('deleteDeptModal')?.addEventListener('click', function(e) {
            if (e.target === this) closeDeleteDeptModal();
        });

        // 初始化
        renderDeptTree();

        // 用户下拉菜单
        const userDropdown = document.getElementById('userDropdown');
        const userDropdownMenu = document.getElementById('userDropdownMenu');
        userDropdown?.addEventListener('click', function(e) {
            e.stopPropagation();
            userDropdownMenu.classList.toggle('show');
        });
        document.addEventListener('click', function() {
            userDropdownMenu?.classList.remove('show');
        });

        // 退出登录
        function openLogoutModal() {
            userDropdownMenu?.classList.remove('show');
            document.getElementById('logoutModal').style.display = 'flex';
        }
        function closeLogoutModal() {
            document.getElementById('logoutModal').style.display = 'none';
        }
        function confirmLogout() {
            closeLogoutModal();
            showToast('正在退出...', 'info');
            setTimeout(() => {
                window.location.href = 'login.html';
            }, 800);
        }
    </script>
</body>
</html>
