    <style>

</head>
<body>

        <div class="sidebar">
            <div class="sidebar-header"><div class="sidebar-logo"><i class="fas fa-x-ray"></i></div><span class="sidebar-title">D-Site</span></div>
            <div class="sidebar-menu">
                <a class="menu-item" href="dashboard.html"><i class="fas fa-th-large"></i><span>仪表盘</span></a>
                <div class="menu-section">云胶片业务</div>
                <a class="menu-item" href="patients.html"><i class="fas fa-users"></i><span>患者管理</span></a>
                <a class="menu-item" href="examinations.html"><i class="fas fa-clipboard-list"></i><span>检查管理</span><span class="badge">5</span></a>
                <a class="menu-item" href="images.html"><i class="fas fa-images"></i><span>影像管理</span></a>
                <a class="menu-item" href="image-viewer.html"><i class="fas fa-eye"></i><span>DICOM阅片</span></a>
                <a class="menu-item" href="reports.html"><i class="fas fa-file-medical"></i><span>诊断报告</span></a>
                <a class="menu-item" href="ai.html"><i class="fas fa-robot"></i><span>AI解读</span><span class="badge" style="background: #722ed1;">NEW</span></a>
                <a class="menu-item" href="share.html"><i class="fas fa-share-alt"></i><span>分享管理</span></a>
                <a class="menu-item" href="statistics.html"><i class="fas fa-chart-bar"></i><span>运营统计</span></a>
                <div class="menu-section">系统管理</div>
                <a class="menu-item" href="users.html"><i class="fas fa-user-cog"></i><span>用户管理</span></a>
                <a class="menu-item" href="roles.html"><i class="fas fa-theater-masks"></i><span>角色管理</span></a>
                <a class="menu-item" href="depts.html"><i class="fas fa-hospital"></i><span>院区管理</span></a>
                <a class="menu-item" href="dict.html"><i class="fas fa-book"></i><span>字典管理</span></a>
                <a class="menu-item" href="logs.html"><i class="fas fa-history"></i><span>日志管理</span></a>
                <a class="menu-item active" href="settings.html"><i class="fas fa-cog"></i><span>系统设置</span></a>
            </div>
        </div>
        <div class="main-content">
            <div class="header">
                <div class="header-left"><div class="breadcrumb"><span>首页</span><i class="fas fa-chevron-right" style="font-size: 10px;"></i><span>系统设置</span></div></div>
                <div class="header-right">
                    <div class="header-icon"><i class="fas fa-bell"></i><span class="count"></span></div>
                    <div class="header-icon"><i class="fas fa-question-circle"></i></div>
                    <div class="user-dropdown">
                        <div class="user-info" id="userDropdown">
                            <div class="user-avatar">A</div>
                            <div class="user-detail">
                                <span class="user-name">管理员</span>
                                <span class="user-role">超级管理员</span>
                            </div>
                            <i class="fas fa-chevron-down" style="font-size: 12px; color: var(--text-secondary);"></i>
                        </div>
                        <div class="user-dropdown-menu" id="userDropdownMenu">
                            <div class="user-dropdown-item" onclick="window.location.href='profile.html'"><i class="fas fa-user"></i><span>个人中心</span></div>
                            <div class="user-dropdown-item" onclick="showToast('修改密码开发中...', 'info')"><i class="fas fa-key"></i><span>修改密码</span></div>
                            <div class="user-dropdown-divider"></div>
                            <div class="user-dropdown-item danger" onclick="openLogoutModal()"><i class="fas fa-sign-out-alt"></i><span>退出登录</span></div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="content">
                <div class="page-header"><h1 class="page-title">系统设置</h1><p class="page-desc">配置系统参数和选项</p></div>
                <div class="card">
                    <div class="card-header"><div class="card-title"><i class="fas fa-cog"></i> 基本设置</div></div>
                    <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px;">
                        <div class="form-item"><label class="form-label">系统名称</label><input type="text" class="input" value="D-Site 云胶片管理系统"></div>
                        <div class="form-item"><label class="form-label">当前版本</label><input type="text" class="input" value="V1.0.0" readonly></div>
                        <div class="form-item"><label class="form-label">默认院区</label><select class="select"><option>总院</option><option>分院</option></select></div>
                        <div class="form-item"><label class="form-label">Token有效期</label><select class="select"><option>2小时</option><option selected>24小时</option><option>7天</option></select></div>
                    </div>
                    <div style="margin-top: 20px; display: flex; justify-content: flex-end;"><button class="btn btn-primary"><i class="fas fa-save"></i> 保存设置</button></div>
                </div>
                <div class="card">
                    <div class="card-header"><div class="card-title"><i class="fas fa-database"></i> 存储设置</div></div>
                    <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px;">
                        <div class="form-item"><label class="form-label">存储方式</label><select class="select"><option selected>本地存储</option><option>MinIO对象存储</option></select></div>
                        <div class="form-item"><label class="form-label">本地存储路径</label><input type="text" class="input" value="./uploads"></div>
                        <div class="form-item"><label class="form-label">文件大小限制</label><input type="text" class="input" value="500MB"></div>
                        <div class="form-item"><label class="form-label">允许的文件格式</label><input type="text" class="input" value=".dcm, .dicom, .jpg, .png"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast" style="display: none;"></div>

    <!-- 退出确认弹窗 -->
    <div id="logoutModal" class="modal-overlay" style="display: none;">
        <div class="modal" style="max-width: 400px;">
            <div class="modal-header">
                <h3 class="modal-title" style="color: var(--danger-color);"><i class="fas fa-sign-out-alt"></i> 确认退出</h3>
                <button class="icon-btn" onclick="closeLogoutModal()"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body" style="text-align: center;">
                <p style="color: var(--text-secondary); margin-bottom: 8px;">确定要退出当前账号吗？</p>
            </div>
            <div class="modal-footer" style="justify-content: center;">
                <button class="btn btn-default" onclick="closeLogoutModal()">取消</button>
                <button class="btn btn-danger" onclick="confirmLogout()"><i class="fas fa-sign-out-alt"></i> 确认退出</button>
            </div>
        </div>
    </div>

    <style>
        .toast { position: fixed; top: 20px; right: 20px; padding: 12px 24px; border-radius: 8px; font-size: 14px; z-index: 2000; display: flex; align-items: center; gap: 8px; animation: slideIn 0.3s ease; }
        .toast.success { background: #f6ffed; border: 1px solid #b7eb8f; color: #52c41a; }
        .toast.info { background: #e6f7ff; border: 1px solid #91d5ff; color: #1890ff; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>

    <script>
        // 设置数据
        let settings = {
            systemName: 'D-Site 云胶片管理系统',
            version: 'V1.0.0',
            defaultDept: '总院',
            tokenValidity: '24小时',
            storageMethod: '本地存储',
            storagePath: './uploads',
            fileSizeLimit: '500MB',
            allowedFormats: '.dcm, .dicom, .jpg, .png',
        };

        function saveSettings() {
            // 收集表单数据
            const inputs = document.querySelectorAll('.card .input, .card .select');
            inputs.forEach(input => {
                const label = input.previousElementSibling?.textContent;
                if (label === '系统名称') settings.systemName = input.value;
                else if (label === '默认院区') settings.defaultDept = input.value;
                else if (label === 'Token有效期') settings.tokenValidity = input.value;
                else if (label === '存储方式') settings.storageMethod = input.value;
                else if (label === '本地存储路径') settings.storagePath = input.value;
                else if (label === '文件大小限制') settings.fileSizeLimit = input.value;
                else if (label === '允许的文件格式') settings.allowedFormats = input.value;
            });

            console.log('保存设置:', settings);
            showToast('系统设置保存成功', 'success');
        }

        function showToast(message, type) {
            const toast = document.getElementById('toast');
            toast.className = `toast ${type}`;
            toast.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'info-circle'}"></i> ${message}`;
            toast.style.display = 'flex';
            setTimeout(() => { toast.style.display = 'none'; }, 3000);
        }

        // 保存按钮
        document.querySelectorAll('.btn-primary').forEach(btn => {
            if (btn.textContent.includes('保存设置')) {
                btn.addEventListener('click', saveSettings);
            }
        });

        // 输入框变更提示
        document.querySelectorAll('.card .input, .card .select').forEach(input => {
            input.addEventListener('change', function() {
                const label = this.previousElementSibling?.textContent;
                if (label) {
                    console.log(`设置项 "${label}" 已更改:`, this.value);
                }
            });
        });

        // 用户下拉菜单
        const userDropdown = document.getElementById('userDropdown');
        const userDropdownMenu = document.getElementById('userDropdownMenu');
        userDropdown?.addEventListener('click', function(e) {
            e.stopPropagation();
            userDropdownMenu.classList.toggle('show');
        });
        document.addEventListener('click', function() {
            userDropdownMenu?.classList.remove('show');
        });

        // 退出登录
        function openLogoutModal() {
            userDropdownMenu?.classList.remove('show');
            document.getElementById('logoutModal').style.display = 'flex';
        }
        function closeLogoutModal() {
            document.getElementById('logoutModal').style.display = 'none';
        }
        function confirmLogout() {
            closeLogoutModal();
            showToast('正在退出...', 'info');
            setTimeout(() => {
                window.location.href = 'login.html';
            }, 800);
        }
    </script>
</body>
</html>
